---
- name: error handling
  hosts: all
  become: true
  tasks:
  - name: Install httpd package
    yum:
      name: httpd
      state: installed
    when: ansible_os_family == "RedHat"
  - name: start httpd service
    service:
      name: http---
      state: started
    when: ansible_os_family == "RedHat"
    igonre_error: yes
  - name: Install apache2
    apt:
      name: apache2
      state: present
    when: ansible_os_family == "Debian"
  - name: start apache service
    service:
      name: apache2
      state: started
    when: ansible_os_family == "Debian"

  - name: copyu index.html
    copy:
      src: /home/ansible/index.html
      dest: /var/www/html
      node: 0666
 

